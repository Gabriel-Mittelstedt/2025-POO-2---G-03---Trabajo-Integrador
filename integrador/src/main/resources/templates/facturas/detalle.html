<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Factura</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">📄 Detalle de Factura</h1>

        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h3>Factura <span th:text="${factura.numeroFactura}"></span></h3>
                <span class="badge float-end" 
                      th:classappend="${factura.estado.name() == 'PAGADA' ? 'bg-success' : 
                                      factura.estado.name() == 'PARCIALMENTE_PAGADA' ? 'bg-warning' : 
                                      factura.estado.name() == 'PENDIENTE' ? 'bg-danger' : 
                                      factura.estado.name() == 'ANULADA' ? 'bg-secondary' : 'bg-info'}"
                      th:text="${factura.estado.descripcion}">
                </span>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>Cliente:</strong> <span th:text="${factura.cliente.razonSocial}"></span></p>
                        <p><strong>CUIT:</strong> <span th:text="${factura.cliente.cuit}"></span></p>
                        <p><strong>Dirección:</strong> <span th:text="${factura.cliente.direccion}"></span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Fecha Emisión:</strong> <span th:text="${#temporals.format(factura.fechaEmision, 'dd/MM/yyyy')}"></span></p>
                        <p><strong>Fecha Vencimiento:</strong> <span th:text="${#temporals.format(factura.fechaVencimiento, 'dd/MM/yyyy')}"></span></p>
                        <p><strong>Tipo:</strong> <span th:text="${factura.tipo}"></span></p>
                        <p th:if="${factura.periodo}"><strong>Período:</strong> <span th:text="${factura.periodo}"></span></p>
                    </div>
                </div>

                <hr>

                <h6>Items de la Factura</h6>
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Descripción</th>
                            <th>Cantidad</th>
                            <th>Precio Unit.</th>
                            <th>Subtotal</th>
                            <th>IVA %</th>
                            <th>IVA $</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${factura.items}">
                            <td th:text="${item.descripcion}"></td>
                            <td th:text="${item.cantidad}"></td>
                            <td>$<span th:text="${#numbers.formatDecimal(item.precioUnitario, 1, 2)}"></span></td>
                            <td>$<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}"></span></td>
                            <td th:text="${item.porcentajeIva + '%'}"></td>
                            <td>$<span th:text="${#numbers.formatDecimal(item.montoIva, 1, 2)}"></span></td>
                            <td>$<span th:text="${#numbers.formatDecimal(item.total, 1, 2)}"></span></td>
                        </tr>
                    </tbody>
                </table>

                <div class="row mt-3">
                    <div class="col-md-8"></div>
                    <div class="col-md-4">
                        <table class="table table-sm">
                            <tr>
                                <td><strong>Subtotal:</strong></td>
                                <td class="text-end">$<span th:text="${#numbers.formatDecimal(factura.subtotal, 1, 2)}"></span></td>
                            </tr>
                            <tr>
                                <td><strong>IVA:</strong></td>
                                <td class="text-end">$<span th:text="${#numbers.formatDecimal(factura.totalIva, 1, 2)}"></span></td>
                            </tr>
                            <tr th:if="${factura.descuento > 0}">
                                <td><strong>Descuento:</strong></td>
                                <td class="text-end text-danger">-$<span th:text="${#numbers.formatDecimal(factura.descuento, 1, 2)}"></span></td>
                            </tr>
                            <tr class="table-primary">
                                <td><strong>TOTAL:</strong></td>
                                <td class="text-end"><strong>$<span th:text="${#numbers.formatDecimal(factura.total, 1, 2)}"></span></strong></td>
                            </tr>
                            <tr th:if="${factura.saldoPendiente > 0}">
                                <td><strong>Saldo Pendiente:</strong></td>
                                <td class="text-end text-danger"><strong>$<span th:text="${#numbers.formatDecimal(factura.saldoPendiente, 1, 2)}"></span></strong></td>
                            </tr>
                        </table>
                    </div>
                </div>

                <div class="mt-3" th:if="${factura.estado != T(com.unam.integrador.model.enums.EstadoFactura).ANULADA and factura.saldoPendiente > 0}">
                    <a th:href="@{/pagos/nuevo/{id}(id=${factura.idFactura})}" class="btn btn-success btn-lg">
                        <i class="bi bi-cash-coin"></i> Registrar Pago
                    </a>
                </div>

                <div class="mt-3" th:if="${factura.puedeAnularse()}">
                    <form th:action="@{/facturas/{id}/anular(id=${factura.id})}" method="post" style="display:inline;">
                        <input type="text" name="motivo" class="form-control d-inline-block w-50" placeholder="Motivo de anulación" required>
                        <button type="submit" class="btn btn-danger" onclick="return confirm('¿Está seguro de anular esta factura?');">Anular Factura</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
