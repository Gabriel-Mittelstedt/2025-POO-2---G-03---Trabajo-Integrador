<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Pago de Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .tipo-pago {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .tipo-pago-option {
            flex: 1;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tipo-pago-option:hover {
            border-color: #0d6efd;
            background-color: #f8f9fa;
        }
        .tipo-pago-option.selected {
            border-color: #0d6efd;
            background-color: #e7f3ff;
        }
        .tipo-pago-option input[type="radio"] {
            margin-right: 10px;
        }
        #monto-container {
            display: none;
        }
        #monto-container.active {
            display: block;
        }
        .info-factura {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">ERP Facturación</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Registrar Pago de Factura</h1>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div class="info-factura">
            <h3>Factura: <span th:text="${factura.numeroFactura}"></span></h3>
            <p><strong>Cliente:</strong> <span th:text="${factura.cliente.razonSocial}"></span></p>
            <p><strong>Total:</strong> $<span th:text="${#numbers.formatDecimal(factura.total, 1, 2)}"></span></p>
            <p><strong>Saldo Pendiente:</strong> <span class="text-primary fs-5">$<span id="saldoPendiente" th:text="${#numbers.formatDecimal(factura.saldoPendiente, 1, 2)}"></span></span></p>
        </div>
        
        <form id="formPago" th:action="@{/pagos/registrar}" method="post">
            <input type="hidden" name="facturaId" th:value="${factura.idFactura}">
            <input type="hidden" id="saldoPendienteValue" th:value="${factura.saldoPendiente}">
            
            <h3>Tipo de Pago</h3>
            <div class="tipo-pago">
                <div class="tipo-pago-option" id="option-total">
                    <label>
                        <input type="radio" name="tipoPago" value="TOTAL" checked>
                        <strong>Pago Total</strong>
                        <p class="mb-0">Pagar el saldo completo de la factura</p>
                        <p class="monto-info text-success mt-2 mb-0">Monto: $<span th:text="${#numbers.formatDecimal(factura.saldoPendiente, 1, 2)}"></span></p>
                    </label>
                </div>
                
                <div class="tipo-pago-option" id="option-parcial">
                    <label>
                        <input type="radio" name="tipoPago" value="PARCIAL">
                        <strong>Pago Parcial</strong>
                        <p class="mb-0">Pagar una parte del saldo pendiente</p>
                        <p class="monto-info text-info mt-2 mb-0">Ingresar monto manualmente</p>
                    </label>
                </div>
            </div>
            
            <div id="monto-container" class="mb-3">
                <label for="monto" class="form-label">Monto a Pagar: *</label>
                <input type="number" id="monto" name="monto" class="form-control" step="0.01" min="0.01" 
                       th:max="${factura.saldoPendiente - 0.01}" placeholder="Ingrese el monto del pago parcial">
                <small class="form-text text-muted">Debe ser menor al saldo pendiente: $<span th:text="${#numbers.formatDecimal(factura.saldoPendiente, 1, 2)}"></span></small>
                <p id="saldo-restante" class="mt-2 fw-bold"></p>
            </div>
            
            <div class="mb-3">
                <label for="metodoPago" class="form-label">Método de Pago: *</label>
                <select name="metodoPago" id="metodoPago" class="form-select" required>
                    <option value="">Seleccione...</option>
                    <option th:each="metodo : ${metodosPago}" 
                            th:value="${metodo}" 
                            th:text="${metodo.descripcion}"></option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="referencia" class="form-label">Referencia (opcional):</label>
                <input type="text" name="referencia" id="referencia" class="form-control" 
                       placeholder="Ej: N° de transferencia, cheque, etc.">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-success">Registrar Pago</button>
                <a th:href="@{/facturas/{id}(id=${factura.idFactura})}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const optionTotal = document.getElementById('option-total');
        const optionParcial = document.getElementById('option-parcial');
        const radioTotal = document.querySelector('input[value="TOTAL"]');
        const radioParcial = document.querySelector('input[value="PARCIAL"]');
        const montoContainer = document.getElementById('monto-container');
        const montoInput = document.getElementById('monto');
        const saldoPendiente = parseFloat(document.getElementById('saldoPendienteValue').value);
        const saldoRestante = document.getElementById('saldo-restante');
        
        // Manejar clicks en las opciones
        optionTotal.addEventListener('click', function() {
            radioTotal.checked = true;
            updateUI();
        });
        
        optionParcial.addEventListener('click', function() {
            radioParcial.checked = true;
            updateUI();
        });
        
        // Actualizar UI según selección
        function updateUI() {
            if (radioTotal.checked) {
                optionTotal.classList.add('selected');
                optionParcial.classList.remove('selected');
                montoContainer.classList.remove('active');
                montoInput.removeAttribute('required');
                montoInput.value = '';
            } else {
                optionParcial.classList.add('selected');
                optionTotal.classList.remove('selected');
                montoContainer.classList.add('active');
                montoInput.setAttribute('required', 'required');
                montoInput.focus();
            }
            saldoRestante.textContent = '';
        }
        
        // Calcular saldo restante en tiempo real
        montoInput.addEventListener('input', function() {
            const monto = parseFloat(this.value) || 0;
            if (monto > 0 && monto < saldoPendiente) {
                const restante = saldoPendiente - monto;
                saldoRestante.textContent = `Saldo restante: $${restante.toFixed(2)}`;
                saldoRestante.style.color = '#198754';
            } else if (monto >= saldoPendiente) {
                saldoRestante.textContent = 'El monto no puede ser mayor o igual al saldo pendiente';
                saldoRestante.style.color = '#dc3545';
            } else {
                saldoRestante.textContent = '';
            }
        });
        
        // Validación antes de enviar
        document.getElementById('formPago').addEventListener('submit', function(e) {
            if (radioParcial.checked) {
                const monto = parseFloat(montoInput.value) || 0;
                if (monto <= 0) {
                    e.preventDefault();
                    alert('Debe ingresar un monto válido mayor a cero');
                    return false;
                }
                if (monto >= saldoPendiente) {
                    e.preventDefault();
                    alert('Para pagar el total, seleccione la opción "Pago Total"');
                    return false;
                }
            }
        });
        
        // Inicializar
        updateUI();
    </script>
</body>
</html>
